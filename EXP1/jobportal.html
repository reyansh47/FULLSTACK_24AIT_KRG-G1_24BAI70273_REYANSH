<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jobportal.cu</title>
    <link rel="stylesheet" href="stylejob.css">
</head>

<body>
    <header>
        <div class="container nav-wrapper">
            <h1 class="logo">jobportal.cu</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Jobs</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="hero">
        <div class="container">
            <h2>Find Your Dream Job</h2>
            <img src="https://placehold.co/100x100/2563eb/white?text=JP" alt="Job Portal Logo" class="hero-logo">
            <form action="#" method="get" class="search-form">
                <input type="text" placeholder="Job title...">
                <select name="category">
                    <option value="">All Categories</option>
                    <option value="tech">Technology</option>
                    <option value="design">Design</option>
                    <option value="marketing">Marketing</option>
                </select>
                <button type="submit">Search</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h3>Latest Jobs</h3>
        <div class="job-grid">
            <div class="job-card">
                <div class="card-header">
                    <h4>Apple</h4>
                </div>
                <dl class="job-details">
                    <dt>Profile:</dt>
                    <dd>iOS Developer</dd>
                    <dt>Location:</dt>
                    <dd>Cupertino</dd>
                    <dt>Salary:</dt>
                    <dd>$120k</dd>
                </dl>
                <button>Apply</button>
            </div>
            <div class="job-card">
                <div class="card-header">
                    <h4>JP Morgan</h4>
                </div>
                <dl class="job-details">
                    <dt>Profile:</dt>
                    <dd>Investment Analyst</dd>
                    <dt>Location:</dt>
                    <dd>New York</dd>
                    <dt>Salary:</dt>
                    <dd>$95k</dd>
                </dl>
                <button>Apply</button>
            </div>
            <div class="job-card">
                <div class="card-header">
                    <h4>Berkshire Hathaway</h4>
                </div>
                <dl class="job-details">
                    <dt>Profile:</dt>
                    <dd>Finance Manager</dd>
                    <dt>Location:</dt>
                    <dd>Omaha</dd>
                    <dt>Salary:</dt>
                    <dd>$110k</dd>
                </dl>
                <button>Apply</button>
            </div>
        </div>
    </div>
</body>

</html>
